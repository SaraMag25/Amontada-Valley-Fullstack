<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu perfil de fazendeira</title>
    <link rel="stylesheet" href="atividade.css">
</head>
<body>
    <main class="fazenda">
        <article class="card-stardew">
            <div class="amizade">
                <span class="coracao">&#128150</span>
            </div>

            <header class="card-header">
                <div class="perfil">
                    <img src="portrait.png" alt="Eu fazendeira">
                </div>
                <div class="nome">
                    <h2> Fazendeira: Sara</h2>
                    <h3>Fazenda: Limoeiro</h3>
                </div>
            </header>
            <div class="card-body">
                <section class="info-basica">
                    <h4>Habilidades:</h4>
                    <p>Cultivo & Pesca</p>
                </section>
                <section class="coisas-favs">
                    <h4> Coisa Favorita</h4>
                    <ul>
                        <li>Sorvete &#127846;</li>
                        <li>Lenda &#x1F41F; </li>
                        <li>Abóbora Dourada &#x1F383;</li>
                    </ul>
                </section>
            </div>
            <footer class="card-footer">
                <p> "Até mesmo a menor, mais sem graça e simples luz guarda um segredo maravilhoso." </p>
            </footer>
        </article>
    </main>
</body>
</html>
